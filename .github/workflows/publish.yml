name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      - name: Build Neoforge
        run: ./gradlew :neoforge:remapJar

      - name: Build Fabric
        run: ./gradlew :fabric:remapJar

      - name: Publish Neoforge to Modrinth
        run: ./gradlew :neoforge:modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}

      - name: Publish Fabric to Modrinth
        run: ./gradlew :fabric:modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
