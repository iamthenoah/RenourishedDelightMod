name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      - name: Build Neoforge
        run: |
          for attempt in 1 2 3; do
            ./gradlew :neoforge:remapJar && break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "Build Neoforge failed (attempt ${attempt}). Retrying in 15 seconds..."
            sleep 15
          done

      - name: Build Fabric
        run: |
          for attempt in 1 2 3; do
            ./gradlew :fabric:remapJar && break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "Build Fabric failed (attempt ${attempt}). Retrying in 15 seconds..."
            sleep 15
          done

      - name: Publish Neoforge to Modrinth
        run: |
          for attempt in 1 2 3; do
            ./gradlew :neoforge:modrinth && break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "Publish Neoforge failed (attempt ${attempt}). Retrying in 15 seconds..."
            sleep 15
          done
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CHANGELOG: ${{ github.event.release.body }}

      - name: Publish Fabric to Modrinth
        run: |
          for attempt in 1 2 3; do
            ./gradlew :fabric:modrinth && break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "Publish Fabric failed (attempt ${attempt}). Retrying in 15 seconds..."
            sleep 15
          done
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CHANGELOG: ${{ github.event.release.body }}
