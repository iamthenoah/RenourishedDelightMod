modLoader = "javafml"
loaderVersion = "[${neoforgeLoaderVersion},)"
license = "${modLicense}"

[[mods]]
modId = "${modId}"
version = "${modVersion}"
displayName = "${modName}"
authors = "${modAuthors}"
description = "${modDescription}"
logoFile = "${modId}.png"
displayURL = "${modDisplayURL}"
issueTrackerURL = "${modIssueTrackerURL}"

[[dependencies.${modId}]]
modId = "neoforge"
mandatory = true
versionRange = "[${neoforgeLoaderVersion},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${modId}]]
modId = "minecraft"
type = "required"
versionRange = "[${minecraftVersion},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${modId}]]
modId = "architectury"
type = "required"
versionRange = "[${architecturyApiVersion},)"
ordering = "AFTER"
side = "BOTH"
